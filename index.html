<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/src/assets/logo.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fix My District</title>
  <meta name="description"
    content="Report road issues, connect with your MLA, and track resolutions in real-time. Together, let's build better districts." />

  <!-- Preload critical assets -->
  <link rel="preload" href="/image.webp" as="image" type="image/webp" />
  <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <!-- Inline critical CSS for loading state -->
  <style>
    #root-loader {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #f9fafb;
      gap: 1rem;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    #root-loader .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid #e5e7eb;
      border-top-color: #ef4444;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    #root-loader p {
      color: #9ca3af;
      font-size: 0.875rem;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>
</head>

<body>
  <div id="root">
    <!-- Shown instantly while React loads -->
    <div id="root-loader">
      <div class="spinner"></div>
      <p>Loading Fix My District…</p>
    </div>
  </div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
